<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>人狼ゲーム 完全版</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(135deg,#020617,#111827);
  color:#fff;
}
header{
  padding:16px;
  background:#020617ee;
  position:sticky;
  top:0;
  z-index:10;
  border-bottom:1px solid #334155;
}
main{max-width:980px;margin:auto;padding:14px}
h1,h2,h3{margin:0 0 12px}
.card{
  background:#1f2937;
  border:1px solid #374151;
  border-radius:18px;
  padding:16px;
  margin:14px 0;
  box-shadow:0 8px 20px #0005;
}
button,input,select{
  width:100%;
  padding:13px;
  margin:7px 0;
  border-radius:12px;
  border:1px solid #4b5563;
  font-size:16px;
}
input,select{background:#111827;color:white}
button{
  background:#2563eb;
  color:white;
  font-weight:800;
  cursor:pointer;
}
button:hover{filter:brightness(1.1)}
button:disabled{opacity:.55;cursor:not-allowed}
.green{background:#16a34a}
.red{background:#dc2626}
.gray{background:#4b5563}
.orange{background:#ea580c}
.hidden{display:none!important}
.note{color:#cbd5e1;line-height:1.7;font-size:14px}
.grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:720px){.grid{grid-template-columns:1fr 1fr}}
.badge{
  display:inline-block;
  background:#374151;
  border:1px solid #475569;
  padding:7px 10px;
  border-radius:999px;
  margin:4px;
}
.dead{opacity:.45;text-decoration:line-through}
.roleBox{
  white-space:pre-line;
  text-align:center;
  background:#020617;
  border:2px solid #60a5fa;
  border-radius:18px;
  padding:24px;
  font-size:25px;
  font-weight:900;
  margin:14px 0;
}
.roleVillage{
  background:#052e2b;
  border-color:#22c55e;
  color:#ecfdf5;
}
.roleWolf{
  background:#450a0a;
  border-color:#ef4444;
  color:#fef2f2;
}
.choiceBtn{
  background:#111827;
  border:1px solid #64748b;
  text-align:left;
}
.choiceBtn.selected{
  background:#2563eb;
  border-color:#93c5fd;
}
.choiceBtn.redChoice.selected{
  background:#dc2626;
  border-color:#fecaca;
}
.nameRow{
  display:grid;
  grid-template-columns:1fr 48px 48px;
  gap:8px;
  align-items:center;
}
.nameRow input{margin:7px 0}
.nameRow button{margin:7px 0;padding:12px 0}
.resultBox{
  white-space:pre-line;
  text-align:center;
  border-radius:18px;
  padding:20px;
  font-size:22px;
  font-weight:900;
  margin:14px 0;
}
.resultVillage{
  background:#052e2b;
  border:2px solid #22c55e;
  color:#ecfdf5;
}
.resultWolf{
  background:#450a0a;
  border:2px solid #ef4444;
  color:#fef2f2;
}
.playerCard{
  background:#111827;
  border:1px solid #374151;
  border-radius:14px;
  padding:12px;
  margin:8px 0;
}
.log{
  background:#020617;
  border:1px solid #334155;
  border-radius:12px;
  padding:12px;
  white-space:pre-line;
  max-height:240px;
  overflow:auto;
}
.big{font-size:23px;font-weight:900}
hr{border:0;border-top:1px solid #374151;margin:14px 0}
</style>
</head>

<body>
<header>
  <h1>人狼ゲーム 完全版</h1>
  <div class="note">4〜15人 / 配役自由 / 1台回し / ホストあり・ホスト不要</div>
</header>

<main>

<section id="home" class="card">
  <h2>モード選択</h2>
  <button onclick="show('localType')">1つのデバイスを回して遊ぶ</button>
</section>

<section id="localType" class="card hidden">
  <h2>1つのデバイスを回すモード</h2>

  <button onclick="startSetup('host')">ゲームホストありモード</button>
  <p class="note">
    役職確認と夜アクションは端末を順番に回します。<br>
    投票・追放はホストが管理します。ホスト用の全プレイヤー表示は折りたたみ式です。
  </p>

  <button class="orange" onclick="startSetup('auto')">ゲームホスト不要モード</button>
  <p class="note">
    役職確認・投票・夜アクションをすべて端末を順番に回して行います。<br>
    追放・襲撃・勝敗判定は自動です。
  </p>

  <button class="gray" onclick="show('home')">戻る</button>
</section>

<section id="setup" class="hidden">
  <div class="card">
    <h2 id="setupTitle">ゲーム設定</h2>
    <label>人数 4〜15人</label>
    <input id="playerCount" type="number" min="4" max="15" value="6" oninput="saveSettings()">
    <button onclick="applyPlayerCount()">人数を反映</button>
    <div id="playerInputs"></div>
  </div>

  <div class="card">
    <h2>役職人数</h2>
    <p class="note">役職の合計がプレイヤー人数と同じになるようにしてください。</p>
    <div id="roleInputs" class="grid"></div>
    <button onclick="startGame()">ゲーム開始</button>
    <button class="green" onclick="setRecommendedRoles()">おすすめ配役にする</button>
    <button class="gray" onclick="clearSavedSettings()">保存した設定を削除</button>
    <button class="gray" onclick="show('localType')">戻る</button>
  </div>
</section>

<section id="reveal" class="hidden">
  <div class="card">
    <h2 id="revealName"></h2>
    <p class="note">本人に端末を渡してから「役職を見る」を押してください。</p>
    <div id="revealBox" class="roleBox hidden"></div>
    <button id="revealBtn" onclick="showRole()">役職を見る</button>
    <button id="revealNextBtn" class="hidden" onclick="nextReveal()">隠して次の人へ</button>
  </div>
</section>

<section id="game" class="hidden">
  <div class="card">
    <h2>ゲーム進行</h2>
    <div class="big" id="phaseText"></div>
    <p id="guideText" class="note"></p>
    <div id="winnerBox" class="roleBox hidden"></div>
    <div id="mainAction"></div>
  </div>

  <div class="card">
    <h2>生存状況</h2>
    <div id="aliveBox"></div>
  </div>

  <div id="hostPanel" class="card hidden">
    <h2>ホスト用</h2>
    <button class="gray" onclick="toggleHostPlayers()">全プレイヤー表示 / 非表示</button>

    <div id="hostPlayersWrap" class="hidden">
      <h3>全プレイヤー</h3>
      <div id="hostPlayers"></div>

      <hr>

      <h3>手動修正</h3>
      <select id="manualTarget"></select>
      <button class="red" onclick="manualKill()">死亡にする</button>
      <button class="green" onclick="manualRevive()">生存に戻す</button>
    </div>

    <hr>

    <h3>追放処理</h3>
    <select id="executeTarget"></select>
    <button class="red" onclick="hostExecute()">選んだ人を追放する</button>
  </div>

  <div class="card">
    <h2>ログ</h2>
    <div id="logBox" class="log"></div>
  </div>
</section>

<section id="passScreen" class="hidden">
  <div class="card">
    <h2 id="passTitle"></h2>
    <p id="passGuide" class="note"></p>
    <div id="passContent"></div>
  </div>
</section>

</main>

<script>
const ROLES = ["市民","占い師","霊媒師","騎士","人狼","狂人","狂信者"];

const DESC = {
  "市民":"特殊能力なし。議論と投票で人狼を探す。",
  "占い師":"夜に1人を占い、人狼かどうか確認できる。",
  "霊媒師":"追放された人が人狼かどうか確認できる。",
  "騎士":"夜に1人を守れる。ただし、このルールでは自分を守れない。",
  "人狼":"夜に人狼同士で相談し、1人を襲撃する。",
  "狂人":"人狼陣営。人狼が誰かは分からない。",
  "狂信者":"人狼陣営。人狼が誰か分かる。"
};

const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, m => ({
  "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
}[m]));

let gameMode = "host";
let players = [];
let revealIndex = 0;
let day = 1;
let phase = "day";
let logs = [];
let winner = "";
let lastExecuted = null;
let lastKilled = null;

let passType = "";
let passIndex = 0;
let passPlayers = [];
let tempVotes = {};
let tempActions = {};

function show(id){
  ["home","localType","setup","reveal","game","passScreen"].forEach(x => $(x).classList.add("hidden"));
  $(id).classList.remove("hidden");
}

function resetPage(){
  location.reload();
}


const SAVE_KEY = "werewolf_local_settings_v1";

function saveSettings(){
  try{
    const count = Number($("playerCount")?.value || 6);
    const names = [...document.querySelectorAll("#playerInputs input")].map(x=>x.value);
    const roles = {};
    document.querySelectorAll(".roleCount").forEach(input=>{
      roles[input.dataset.role] = Number(input.value) || 0;
    });

    localStorage.setItem(SAVE_KEY, JSON.stringify({
      count,
      names,
      roles
    }));
  }catch(e){
    console.warn("設定保存に失敗しました", e);
  }
}

function loadSettings(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){
    console.warn("設定読み込みに失敗しました", e);
    return null;
  }
}

function clearSavedSettings(){
  try{
    localStorage.removeItem(SAVE_KEY);
  }catch(e){
    console.warn("設定削除に失敗しました", e);
  }

  $("playerCount").value = 6;
  $("playerInputs").innerHTML = "";
  $("roleInputs").innerHTML = "";
  applyPlayerCount(true);
  alert("保存した設定を削除しました。");
}

function startSetup(mode){
  gameMode = mode;
  $("setupTitle").textContent = mode === "host"
    ? "ゲームホストありモード：設定"
    : "ゲームホスト不要モード：設定";
  const saved = loadSettings();
  if(saved && saved.count){
    $("playerCount").value = saved.count;
  }
  show("setup");
  applyPlayerCount();
}

function clampCount(){
  let n = Number($("playerCount").value);
  if(isNaN(n)) n = 4;
  n = Math.max(4, Math.min(15, n));
  $("playerCount").value = n;
  return n;
}

function recommendedRoles(n){
  const r = {"市民":0,"占い師":1,"霊媒師":0,"騎士":0,"人狼":1,"狂人":0,"狂信者":0};
  if(n >= 5) r["騎士"] = 1;
  if(n >= 7) r["霊媒師"] = 1;
  if(n >= 8) r["人狼"] = 2;
  if(n >= 9) r["狂人"] = 1;
  if(n >= 12) r["人狼"] = 3;
  if(n >= 14){ r["狂人"] = 0; r["狂信者"] = 1; }
  const used = Object.values(r).reduce((a,b)=>a+b,0);
  r["市民"] = Math.max(0, n - used);
  return r;
}

function applyPlayerCount(forceDefault=false){
  const n = clampCount();
  const saved = forceDefault ? null : loadSettings();
  const old = [...document.querySelectorAll("#playerInputs input")].map(x=>x.value);
  const names = forceDefault ? [] : (old.length ? old : (saved?.names || []));

  $("playerInputs").innerHTML = "";

  for(let i=0;i<n;i++){
    const div = document.createElement("div");
    div.className = "nameRow";
    div.innerHTML = `
      <input id="player${i}" placeholder="プレイヤー名" value="${esc(names[i] || "プレイヤー" + (i+1))}" oninput="saveSettings()">
      <button class="gray" type="button" onclick="movePlayer(${i},-1)" ${i===0 ? "disabled" : ""}>↑</button>
      <button class="gray" type="button" onclick="movePlayer(${i},1)" ${i===n-1 ? "disabled" : ""}>↓</button>
    `;
    $("playerInputs").appendChild(div);
  }

  makeRoleInputs(n, forceDefault ? null : (saved?.roles || null));
  saveSettings();
}

function movePlayer(index, direction){
  const inputs = [...document.querySelectorAll("#playerInputs input")];
  const names = inputs.map(x=>x.value);
  const target = index + direction;

  if(target < 0 || target >= names.length) return;

  [names[index], names[target]] = [names[target], names[index]];

  inputs.forEach((input,i)=>{
    input.value = names[i];
  });

  saveSettings();
  applyPlayerCount();
}

function makeRoleInputs(n, savedRoles=null){
  const r = savedRoles || recommendedRoles(n);
  $("roleInputs").innerHTML = "";

  ROLES.forEach(role=>{
    const div = document.createElement("div");
    div.innerHTML = `
      <label>${role}</label>
      <input class="roleCount" data-role="${role}" type="number" min="0" max="15" value="${r[role] ?? 0}" oninput="saveSettings()">
    `;
    $("roleInputs").appendChild(div);
  });
}

function setRecommendedRoles(){
  makeRoleInputs(clampCount(), null);
  saveSettings();
}

function collectRoles(){
  const pool = [];
  document.querySelectorAll(".roleCount").forEach(input=>{
    const role = input.dataset.role;
    const num = Math.max(0, Number(input.value) || 0);
    for(let i=0;i<num;i++) pool.push(role);
  });
  return pool;
}

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startGame(){
  saveSettings();
  const n = clampCount();
  const pool = collectRoles();

  if(pool.length !== n){
    alert("役職の合計を " + n + " 人にしてください。現在は " + pool.length + " 人です。");
    return;
  }
  if(!pool.includes("人狼")){
    alert("人狼を最低1人入れてください。");
    return;
  }

  const roles = shuffle(pool);
  players = [];

  for(let i=0;i<n;i++){
    players.push({
      id:"p" + i,
      name:$("player"+i).value.trim() || "プレイヤー" + (i+1),
      role:roles[i],
      alive:true,
      result:""
    });
  }

  revealIndex = 0;
  day = 1;
  phase = "day";
  logs = ["ゲーム開始"];
  winner = "";
  lastExecuted = null;
  lastKilled = null;

  show("reveal");
  setupReveal();
}

function setupReveal(){
  const p = players[revealIndex];
  $("revealName").textContent = p.name + " さんの番です";
  $("revealBox").className = "roleBox hidden";
  $("revealBox").textContent = "";
  $("revealBtn").classList.remove("hidden");
  $("revealNextBtn").classList.add("hidden");
}

function roleTeam(role){
  return role === "人狼" || role === "狂人" || role === "狂信者" ? "wolf" : "village";
}

function roleClassFor(role){
  return roleTeam(role) === "wolf" ? "roleWolf" : "roleVillage";
}

function roleTextFor(p){
  let text = p.role + "\n" + DESC[p.role];

  if(p.role === "人狼" || p.role === "狂信者"){
    const wolves = players.filter(x=>x.role==="人狼").map(x=>x.name).join("、");
    text += "\n\n人狼：" + wolves;
  }

  if(p.result){
    text += "\n\n結果：" + p.result;
  }

  return text;
}

function showRole(){
  const p = players[revealIndex];
  $("revealBox").textContent = roleTextFor(p);
  $("revealBox").className = "roleBox " + roleClassFor(p.role);
  $("revealBtn").classList.add("hidden");
  $("revealNextBtn").classList.remove("hidden");
}

function nextReveal(){
  revealIndex++;
  if(revealIndex >= players.length){
    show("game");
    renderGame();
    return;
  }
  setupReveal();
}

function alivePlayers(){
  return players.filter(p=>p.alive);
}

function judge(){
  const alive = alivePlayers();
  const wolves = alive.filter(p=>p.role==="人狼").length;
  const others = alive.length - wolves;

  if(wolves === 0) return "市民陣営の勝利";
  if(wolves >= others) return "人狼陣営の勝利";
  return "";
}

function phaseName(){
  return {day:"昼", vote:"投票", night:"夜", result:"朝"}[phase] || phase;
}

function guide(){
  if(winner) return "ゲーム終了です。";
  if(gameMode === "host"){
    if(phase === "day") return "議論してください。追放対象はホストが下の操作から選びます。";
    if(phase === "night") return "端末を順番に回して夜アクションを行います。";
    if(phase === "result") return "朝の結果です。確認したら次の日へ進んでください。";
  }else{
    if(phase === "day") return "議論してください。終わったら端末を回して投票します。";
    if(phase === "vote") return "全員が端末を順番に回して投票します。";
    if(phase === "night") return "全員が端末を順番に回して夜アクションをします。";
    if(phase === "result") return "朝の結果です。確認したら次の日へ進んでください。";
  }
  return "";
}

function renderGame(){
  $("phaseText").textContent = winner ? "ゲーム終了" : day + "日目：" + phaseName();
  $("guideText").textContent = guide();

  $("winnerBox").classList.toggle("hidden", !winner);
  $("winnerBox").textContent = winner;

  $("aliveBox").innerHTML = players.map(p=>`
    <span class="badge ${p.alive ? "" : "dead"}">
      ${esc(p.name)}：${p.alive ? "生存" : "死亡"}
    </span>
  `).join("");

  $("hostPanel").classList.toggle("hidden", gameMode !== "host");

  $("hostPlayers").innerHTML = players.map(p=>`
    <div class="playerCard ${p.alive ? "" : "dead"}">
      ${esc(p.name)}：${p.role} / ${p.alive ? "生存" : "死亡"}
    </div>
  `).join("");

  $("executeTarget").innerHTML = alivePlayers().map(p=>`
    <option value="${p.id}">${esc(p.name)}</option>
  `).join("");

  $("manualTarget").innerHTML = players.map(p=>`
    <option value="${p.id}">${esc(p.name)} / ${p.alive ? "生存" : "死亡"} / ${p.role}</option>
  `).join("");

  $("logBox").textContent = logs.join("\n");

  let html = "";

  if(winner){
    html = `<button class="green" onclick="resetPage()">最初から</button>`;
  }else if(gameMode === "host"){
    if(phase === "day"){
      html = `<button class="green" onclick="goNight()">夜アクションへ進む</button>`;
    }else if(phase === "night"){
      html = `<button onclick="startNightPass()">夜アクションを開始</button>`;
    }else if(phase === "result"){
      html = `<button class="green" onclick="nextDay()">次の日へ</button>`;
    }
  }else{
    if(phase === "day"){
      html = `<button onclick="startVotePass()">投票を開始</button>`;
    }else if(phase === "vote"){
      html = `<button onclick="startVotePass()">投票を開始</button>`;
    }else if(phase === "night"){
      html = `<button onclick="startNightPass()">夜アクションを開始</button>`;
    }else if(phase === "result"){
      html = `<button class="green" onclick="nextDay()">次の日へ</button>`;
    }
  }

  $("mainAction").innerHTML = html;
}

function toggleHostPlayers(){
  $("hostPlayersWrap").classList.toggle("hidden");
}

function hostExecute(){
  const id = $("executeTarget").value;
  const p = players.find(x=>x.id===id);
  if(!p || !p.alive) return;

  p.alive = false;
  lastExecuted = {...p};
  logs.push(day + "日目：" + p.name + " が追放された");

  winner = judge();
  if(!winner) phase = "night";
  renderGame();
}

function manualKill(){
  const p = players.find(x=>x.id===$("manualTarget").value);
  if(!p) return;
  p.alive = false;
  logs.push(p.name + " を死亡にした");
  winner = judge();
  renderGame();
}

function manualRevive(){
  const p = players.find(x=>x.id===$("manualTarget").value);
  if(!p) return;
  p.alive = true;
  logs.push(p.name + " を生存に戻した");
  winner = judge();
  renderGame();
}

function goNight(){
  if(winner) return;
  phase = "night";
  renderGame();
}

function nextDay(){
  if(winner){
    renderGame();
    return;
  }
  day++;
  phase = "day";
  players.forEach(p=>p.result="");
  renderGame();
}

function startVotePass(){
  phase = "vote";
  passType = "vote";
  passPlayers = alivePlayers();
  passIndex = 0;
  tempVotes = {};
  show("passScreen");
  renderPassIntro();
}

function startNightPass(){
  phase = "night";
  passType = "night";
  passPlayers = alivePlayers();
  passIndex = 0;
  tempActions = {};
  players.forEach(p=>p.result="");
  show("passScreen");
  renderPassIntro();
}

function currentPassPlayer(){
  return passPlayers[passIndex];
}

function renderPassIntro(){
  const p = currentPassPlayer();

  if(!p){
    if(passType === "vote") finishVotePass();
    else finishNightPass();
    return;
  }

  $("passTitle").textContent = p.name + " さんの番です";

  if(passType === "night"){
    $("passGuide").textContent = "夜アクションの本人確認です。本人に端末を渡してから開始してください。";
    $("passContent").innerHTML = `
      <p class="note">他の人に画面を見られないようにしてください。</p>
      <button onclick="renderPassAction()">夜アクションを開始</button>
    `;
  }else{
    $("passGuide").textContent = "投票の本人確認です。本人に端末を渡してから開始してください。";
    $("passContent").innerHTML = `
      <p class="note">他の人に投票先を見られないようにしてください。</p>
      <button onclick="renderPassAction()">投票を開始</button>
    `;
  }
}

let selectedChoice = "";

function selectChoice(id){
  selectedChoice = id;
  document.querySelectorAll(".choiceBtn").forEach(btn=>{
    btn.classList.toggle("selected", btn.dataset.id === id);
  });
}

function choiceButtons(items, red=false){
  return items.map(item=>`
    <button type="button" class="choiceBtn ${red ? "redChoice" : ""}" data-id="${item.id}" onclick="selectChoice('${item.id}')">
      ${esc(item.name)}
    </button>
  `).join("");
}

function renderPassAction(){
  const p = currentPassPlayer();

  if(!p){
    if(passType === "vote") finishVotePass();
    else finishNightPass();
    return;
  }

  $("passTitle").textContent = p.name + " さんの番です";
  $("passGuide").textContent = "操作が終わったら、次の人へ端末を渡してください。";

  if(passType === "vote"){
    selectedChoice = "";
    const choices = alivePlayers().filter(x=>x.id !== p.id);

    $("passContent").innerHTML = `
      <p class="note">追放したい人を選んでください。</p>
      ${choiceButtons(choices, true)}
      <button class="red" onclick="submitVote()">投票する</button>
    `;
    return;
  }

  $("passContent").innerHTML = `
    <div class="roleBox">${esc(roleTextFor(p))}</div>
    ${nightActionHTML(p)}
  `;

  if(isNoNightAbility(p.role)){
    const delay = 3000 + Math.floor(Math.random() * 2001);
    const btn = $("noActionBtn");
    if(btn){
      btn.disabled = true;
      btn.textContent = "確認中...";
      setTimeout(()=>{
        btn.disabled = false;
        btn.textContent = "夜を終える";
      }, delay);
    }
  }
}

function isNoNightAbility(role){
  return role === "市民" || role === "狂人" || role === "狂信者";
}

function nightActionHTML(p){
  const alive = alivePlayers();
  selectedChoice = "";

  if(p.role === "人狼"){
    const choices = alive.filter(x=>x.role !== "人狼");
    return `
      <p class="note">襲撃対象を選んでください。</p>
      ${choiceButtons(choices, true)}
      <button class="red" onclick="submitNightAction()">襲撃する</button>
    `;
  }

  if(p.role === "占い師"){
    const choices = alive.filter(x=>x.id !== p.id);
    return `
      <p class="note">占う相手を選んでください。</p>
      ${choiceButtons(choices, false)}
      <button class="green" onclick="submitNightAction()">占う</button>
    `;
  }

  if(p.role === "騎士"){
    const choices = alive.filter(x=>x.id !== p.id);
    return `
      <p class="note">守る相手を選んでください。自分は守れません。</p>
      ${choiceButtons(choices, false)}
      <button class="green" onclick="submitNightAction()">守る</button>
    `;
  }

  if(p.role === "霊媒師"){
    return `<button class="green" onclick="submitNightAction()">霊媒結果を見る</button>`;
  }

  return `<button id="noActionBtn" onclick="submitNightAction()">夜を終える</button>`;
}

function submitVote(){
  const p = currentPassPlayer();
  if(!selectedChoice){
    alert("投票先を選んでください。");
    return;
  }
  tempVotes[p.id] = selectedChoice;
  selectedChoice = "";
  passIndex++;
  renderPassIntro();
}

function finishVotePass(){
  const counts = {};
  Object.values(tempVotes).forEach(id=>{
    counts[id] = (counts[id] || 0) + 1;
  });

  const max = Math.max(...Object.values(counts));
  const tied = Object.keys(counts).filter(id=>counts[id]===max);
  const executedId = tied[Math.floor(Math.random()*tied.length)];
  const p = players.find(x=>x.id===executedId);

  p.alive = false;
  lastExecuted = {...p};
  logs.push(day + "日目：" + p.name + " が追放された");

  winner = judge();
  phase = winner ? "result" : "night";

  show("game");
  renderGame();
}

function submitNightAction(){
  const p = currentPassPlayer();
  const needsTarget = p.role === "人狼" || p.role === "占い師" || p.role === "騎士";
  const target = needsTarget ? selectedChoice : "done";

  if(needsTarget && !target){
    alert("対象を選んでください。");
    return;
  }

  if(p.role === "占い師"){
    const t = players.find(x=>x.id===target);
    const isWolf = t && t.role === "人狼";
    const result = t
      ? `${t.name} は ${isWolf ? "人狼" : "人狼ではない"}。`
      : "結果なし。";

    p.result = result;
    tempActions[p.id] = target;

    $("passContent").innerHTML = `
      <div class="resultBox ${isWolf ? "resultWolf" : "resultVillage"}">占い結果\n${esc(result)}</div>
      <button class="green" onclick="finishCurrentNightPlayer()">結果を隠して次の人へ</button>
    `;
    return;
  }

  if(p.role === "霊媒師"){
    const isWolf = lastExecuted && lastExecuted.role === "人狼";
    const result = lastExecuted
      ? `${lastExecuted.name} は ${isWolf ? "人狼" : "人狼ではない"}。`
      : "まだ霊媒結果はありません。";

    p.result = result;
    tempActions[p.id] = "done";

    $("passContent").innerHTML = `
      <div class="resultBox ${isWolf ? "resultWolf" : "resultVillage"}">霊媒結果\n${esc(result)}</div>
      <button class="green" onclick="finishCurrentNightPlayer()">結果を隠して次の人へ</button>
    `;
    return;
  }

  tempActions[p.id] = target;
  finishCurrentNightPlayer();
}

function finishCurrentNightPlayer(){
  passIndex++;
  renderPassIntro();
}

function finishNightPass(){
  let killId = "";
  const wolfVotes = {};

  alivePlayers().forEach(p=>{
    if(p.role === "人狼" && tempActions[p.id]){
      wolfVotes[tempActions[p.id]] = (wolfVotes[tempActions[p.id]] || 0) + 1;
    }
  });

  if(Object.keys(wolfVotes).length){
    const max = Math.max(...Object.values(wolfVotes));
    const tied = Object.keys(wolfVotes).filter(id=>wolfVotes[id]===max);
    killId = tied[Math.floor(Math.random()*tied.length)];
  }

  const knight = alivePlayers().find(p=>p.role==="騎士");
  const guardId = knight ? tempActions[knight.id] : "";

  if(killId && killId !== guardId){
    const killed = players.find(x=>x.id===killId);
    if(killed){
      killed.alive = false;
      lastKilled = {...killed};
      logs.push(day + "日目夜：" + killed.name + " が襲撃された");
    }
  }else{
    logs.push(day + "日目夜：襲撃は失敗した");
  }

  winner = judge();
  phase = "result";

  show("game");
  renderGame();
}

show("home");
</script>
</body>
</html>
